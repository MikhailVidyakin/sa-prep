<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SA Prep">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f14">
<title>SA Prep</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0d0f14;overflow:hidden;overscroll-behavior:none}
iframe{position:fixed;top:0;left:0;width:100%;height:100%;border:none}
.ld{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0d0f14;z-index:10;transition:opacity .5s}
.ld.h{opacity:0;pointer-events:none}
.sp{width:32px;height:32px;border:3px solid #1e2330;border-top-color:#4f8ef7;border-radius:50%;animation:s .6s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.ld p{color:#8890a8;font-family:system-ui,-apple-system,sans-serif;font-size:14px}
</style>
</head>
<body>

<div class="ld" id="ld">
  <div class="sp"></div>
  <p>Загрузка SA Prep…</p>
</div>

<iframe
  id="app"
  src="https://script.google.com/macros/s/AKfycbx3C3DzTP-M4YROeE1ejnuf4MzhT_gXoET7KZ6V0awTjWxW56vXBG5hglyaVWLEQjWoBg/exec"
  allow="clipboard-write"
></iframe>

<script>
document.getElementById('app').addEventListener('load', function() {
  setTimeout(function() {
    document.getElementById('ld').classList.add('h');
  }, 400);
});
// Запасной таймер — если iframe не вызовет load
setTimeout(function() {
  document.getElementById('ld').classList.add('h');
}, 8000);
</script>
</body>
</html>
